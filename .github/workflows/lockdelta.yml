on:
  pull_request:
    branches:
      - master

jobs:
  lock-delta:
    name: Compute and report dependency updates
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Compute and report dependency updates
        uses: lachaib/lockdelta@v0.1.0
        with:
          post-comment: if-changed
        env:
          GITHUB_TOKEN: ${{github.token}}
